name: Deploy Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://admin.url-redir.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies (Redir Engine)
        working-directory: ./redir-engine
        run: npm ci

      - name: Deploy Engine to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ./redir-engine
          command: deploy --env production

      - name: Deploy Admin Service to VPS (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/url-redir-short
            bash scripts/deploy-production.sh ${{ github.ref_name }}
