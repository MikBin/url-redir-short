# Docker Compose for local/LAN testing with Podman
# Usage:
#   Local:     podman-compose up
#   LAN:       podman-compose -f docker-compose.yml up
#             (Access via host machine IP instead of localhost)

name: url-redir-short
services:
  # PostgreSQL database (Supabase local uses this)
  db:
    image: postgres:15-alpine
    container_name: url-redir-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
      POSTGRES_HOST_AUTH_METHOD: trust
    secrets:
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis/Valkey for caching
  redis:
    image: valkey/valkey:8-alpine
    container_name: url-redir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Admin Service (Nuxt)
  admin:
    build:
      context: ./admin-service/supabase
      dockerfile: Dockerfile
    container_name: url-redir-admin
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    command: ["node", ".output/server/index.mjs"]
    environment:
      # Use service name for container networking
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY_FILE: /run/secrets/SUPABASE_KEY
      SUPABASE_SERVICE_KEY_FILE: /run/secrets/SUPABASE_SERVICE_KEY
      SUPABASE_JWT_SECRET_FILE: /run/secrets/SUPABASE_JWT_SECRET
      NUXT_HOST: "0.0.0.0"
      PORT: 3000
      # For SSE sync - use service name in container network
      SYNC_API_KEY_FILE: /run/secrets/SYNC_API_KEY
      REDIS_URL: redis://redis:6379
      IP_HASH_SALT_FILE: /run/secrets/IP_HASH_SALT
      CORS_ALLOWED_ORIGINS: "*"
      LOG_LEVEL: debug
    secrets:
      - SUPABASE_KEY
      - SUPABASE_SERVICE_KEY
      - SYNC_API_KEY
      - IP_HASH_SALT
      - SUPABASE_JWT_SECRET
    ports:
      - "3001:3000"
    volumes:
      - ./scripts/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - url-redir-net

  # Redirect Engine (Hono/Node)
  engine:
    build:
      context: ./redir-engine
      dockerfile: Dockerfile
    container_name: url-redir-engine
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    command: ["node", "dist/runtimes/node/index.js"]
    environment:
      PORT: 3000
      # Admin service URL for SSE sync - use service name in container network
      ADMIN_SERVICE_URL: http://admin:3000/api/sync/stream
      ANALYTICS_SERVICE_URL: http://admin:3000
      SYNC_API_KEY_FILE: /run/secrets/SYNC_API_KEY
      NODE_ENV: production
    secrets:
      - SYNC_API_KEY
    ports:
      - "3002:3000"
    volumes:
      - ./scripts/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - url-redir-net

  # Optional: Supabase Studio (DB management UI)
  studio:
    image: supabase/studio:20241028-91ff5dd
    container_name: url-redir-studio
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
    ports:
      - "3003:3000"
    depends_on:
      - db
    networks:
      - url-redir-net
    profiles:
      - studio  # Only start with: podman-compose --profile studio up

volumes:
  db_data:
  redis_data:

networks:
  url-redir-net:
    driver: bridge

secrets:
  POSTGRES_PASSWORD:
    file: ./secrets/POSTGRES_PASSWORD.txt
  SUPABASE_KEY:
    file: ./secrets/SUPABASE_KEY.txt
  SUPABASE_SERVICE_KEY:
    file: ./secrets/SUPABASE_SERVICE_KEY.txt
  SYNC_API_KEY:
    file: ./secrets/SYNC_API_KEY.txt
  IP_HASH_SALT:
    file: ./secrets/IP_HASH_SALT.txt
  SUPABASE_JWT_SECRET:
    file: ./secrets/SUPABASE_JWT_SECRET.txt
