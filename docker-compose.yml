# Docker Compose for local/LAN testing with Podman
# Usage:
#   Local:     podman-compose up
#   LAN:       podman-compose -f docker-compose.yml up
#             (Access via host machine IP instead of localhost)

name: url-redir-short
services:
  # PostgreSQL database (Supabase local uses this)
  db:
    image: postgres:15-alpine
    container_name: url-redir-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis/Valkey for caching
  redis:
    image: valkey/valkey:8-alpine
    container_name: url-redir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Admin Service (Nuxt)
  admin:
    build:
      context: ./admin-service/supabase
      dockerfile: Dockerfile
    container_name: url-redir-admin
    environment:
      # Use service name for container networking
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      NUXT_HOST: "0.0.0.0"
      PORT: 3000
      # For SSE sync - use service name in container network
      SYNC_API_KEY: local-dev-sync-key
      REDIS_URL: redis://redis:6379
      IP_HASH_SALT: dev-salt-change-in-prod
      CORS_ALLOWED_ORIGINS: "*"
      LOG_LEVEL: debug
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - url-redir-net

  # Redirect Engine (Hono/Node)
  engine:
    build:
      context: ./redir-engine
      dockerfile: Dockerfile
    container_name: url-redir-engine
    environment:
      PORT: 3000
      # Admin service URL for SSE sync - use service name in container network
      ADMIN_SERVICE_URL: http://admin:3000/api/sync/stream
      ANALYTICS_SERVICE_URL: http://admin:3000
      SYNC_API_KEY: local-dev-sync-key
      NODE_ENV: production
    ports:
      - "3002:3000"
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - url-redir-net

  # Optional: Supabase Studio (DB management UI)
  studio:
    image: supabase/studio:20241028-91ff5dd
    container_name: url-redir-studio
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
    ports:
      - "3003:3000"
    depends_on:
      - db
    networks:
      - url-redir-net
    profiles:
      - studio  # Only start with: podman-compose --profile studio up

volumes:
  db_data:
  redis_data:

networks:
  url-redir-net:
    driver: bridge
